spring:
  application:
    name: shopping-cart

  datasource:
    url: jdbc:postgresql://localhost:5432/shopping_cart
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

aws:
  dynamodb:
    endpoint: http://localhost:4566
    region: us-east-1
    access-key: test
    secret-key: test
